<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="produtos-localstorage.js" crossorigin="anonymous" defer></script>
    <title>Produtos</title>
</head>
<body>
    <div class="container p-3">
        <form id="formularioProdutos" style="max-width: 400px;">
            <div class="mb-3">
                <label for="produtoId" class="form-label">ID do Produto</label>
                <input type="number" class="form-control" id="produtoId" name="produtoId" required>
            </div>
            <div class="mb-3">
                <label for="produtoNome" class="form-label">Nome do Produto</label>
                <input type="text" class="form-control" id="produtoNome" name="produtoNome" required>
            </div>
            <div class="mb-3">
                <label for="produtoPreco" class="form-label">Preço do Produto</label>
                <input type="number" step="0.01" class="form-control" id="produtoPreco" name="produtoPreco" required>
            </div>
            <button type="button" class="btn btn-primary" onclick="adicionarProduto()">Adicionar Produto</button>
        </form>
        <h1>Produtos</h1>
        <p id="status" class="text-secondary">Carregando produtos...</p>

        <table class="table table-striped table-hover mt-4" id="tabelaProdutos">
            <thead class="table-dark">
                <tr id="cabecalho-produtos">
                    <td>ID</td>
                    <td>Nome</td>
                    <td>Preço</td>
                </tr>
            </thead>
            <tbody id="tabela-produtos"></tbody>
        </table>
    </div>
</body>
</html>
